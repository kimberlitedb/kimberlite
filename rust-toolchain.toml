# Rust toolchain configuration
# See: https://rust-lang.github.io/rustup/overrides.html
#
# Profile choice notes:
# - `default` bundles rustc + cargo + rust-std + rustfmt + clippy +
#   rust-docs. We need cargo (Python wheel build broke under
#   `minimal` because dtolnay/rust-toolchain only honours the
#   profile flag, and the rustup minimal profile on some channel
#   builds doesn't ship cargo even though docs say it should).
# - The `clippy-preview` conflict that originally drove us to
#   `minimal` is avoided here by NOT listing clippy/rustfmt under
#   `components` — `default` already installs them.
# - Only rust-analyzer, which is NOT in `default`, needs to be in
#   the components list.

[toolchain]
channel = "1.88"
components = ["rust-analyzer"]
profile = "default"
