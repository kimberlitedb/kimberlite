[package]
name = "kimberlite-sim"
version.workspace = true
edition.workspace = true
description = "Deterministic simulation testing harness for Kimberlite"
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false  # Internal testing framework

[dependencies]
kimberlite-compliance = { workspace = true, features = ["sim"] }
kimberlite-crypto = { workspace = true, features = ["sim"] }
kimberlite-kernel = { workspace = true, features = ["sim"] }
kimberlite-types.workspace = true
kimberlite-vsr = { workspace = true, features = ["sim"] }
kimberlite-oracle.workspace = true
kimberlite-query = { workspace = true, features = ["sim"] }
kimberlite-properties = { workspace = true, features = ["sim"] }
kimberlite-storage = { workspace = true, features = ["sim"] }
kimberlite-store.workspace = true
uuid = { workspace = true }
bytes.workspace = true

tempfile.workspace = true
thiserror.workspace = true

# Random number generation with seedable RNG for reproducibility
rand = { version = "0.8", features = ["small_rng"] }

# JSON output and checkpoint serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
postcard = { workspace = true }
chrono = "0.4"

# Web dashboard dependencies (optional)
axum = { version = "0.8", optional = true }
askama = { version = "0.15", optional = true }
tower-http = { version = "0.6", features = ["fs"], optional = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "net"], optional = true }
tokio-stream = { version = "0.1", optional = true }

# TUI dependencies (optional)
ratatui = { version = "0.30", optional = true }
crossterm = { version = "0.27", optional = true }

# AUDIT-2026-04 H-1 / M-3 — the traceability matrix validates each
# trace entry against the real AST of the cited file. See
# `trace_alignment::TraceValidator` for the full story. Lives in main
# `dependencies` (not dev-dependencies) because `TraceValidator` is
# invoked from lib code so CLI tools and CI tasks share the same
# validator the unit tests exercise. This crate is `publish = false`,
# so the compile-time cost of `syn` is not shipped anywhere.
syn = { version = "2", features = ["full", "parsing", "extra-traits"] }
proc-macro2 = { version = "1", features = ["span-locations"] }

[dev-dependencies]
proptest.workspace = true
tempfile.workspace = true

[features]
# Enable simulation instrumentation
default = []

# Include aspirational scenarios — variants whose scenario bodies are in place
# but whose simulator driver does not yet perform the full orchestration the
# scenario name implies (e.g. UpgradeGradualRollout runs a healthy cluster
# instead of driving a real sequential version rollout). Gated here so
# `just vopr-scenarios` lists only the battle-tested set by default; opt in
# with `--features aspirational-scenarios` for exploratory work. ROADMAP
# v0.5.0 deferred item: "VOPR scaffolded scenarios — ship or delete."
aspirational-scenarios = []

# Web dashboard for coverage visualization
dashboard = ["axum", "askama", "tower-http", "tokio", "tokio-stream"]

# Terminal UI for interactive simulation
tui = ["ratatui", "crossterm"]

# Canary mutations (intentional bugs for testing invariants)
canary-skip-fsync = []
canary-wrong-hash = []
canary-commit-quorum = []
canary-idempotency-race = []
canary-monotonic-regression = []

# Simulator-level canaries (intentional bugs in VOPR itself)
sim-canary-partition-leak = []
sim-canary-time-leak = []
sim-canary-drop-disabled = []
sim-canary-fsync-lies = []
sim-canary-rng-unseeded = []

# AUDIT-2026-04 C-2 canary. When enabled, the synthetic canary helper
# `sim_canaries::synthesize_cross_tenant_catalog_event` emits a
# cross-tenant CatalogOperationApplied event on every tick. If VOPR's
# new `verify_catalog_isolation` wire is load-bearing, the canary
# triggers a `query_catalog_isolation` violation; if the wire is broken
# the sim silently passes, exactly replicating the failure mode the
# April-2026 projection-table bug exploited.
sim-canary-catalog-cross-tenant = []

# AUDIT-2026-04 H-3 canaries. Feed synthetic "prepare without
# commit" / "view-change start without complete" signals to the
# liveness checkers. If VOPR's H-3 wire is load-bearing, these canaries
# trigger `liveness_eventual_commit` / `liveness_eventual_progress`
# violations respectively.
sim-canary-stalled-prepare = []
sim-canary-stalled-view-change = []

[lints]
workspace = true
