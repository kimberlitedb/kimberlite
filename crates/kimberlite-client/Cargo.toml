[package]
name = "kimberlite-client"
description = "Kimberlite RPC client"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# Internal crates
kimberlite-types.workspace = true
kimberlite-wire.workspace = true

# Core
bytes.workspace = true
thiserror.workspace = true

# Observability
tracing.workspace = true

# Optional: serde-based typed row mapping
serde = { workspace = true, optional = true }

[features]
default = ["typed-rows"]
# Enables `Client::query_typed::<T>()` via serde deserialisation.
typed-rows = ["dep:serde"]

[dev-dependencies]
tempfile.workspace = true
serde = { workspace = true, features = ["derive"] }
