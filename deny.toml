# cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

# --------------------------------------------------
# GRAPH
# --------------------------------------------------

[graph]
# Analyze all features to catch issues in optional dependencies
all-features = true
no-default-features = false

# --------------------------------------------------
# ADVISORIES
# --------------------------------------------------

[advisories]
version = 2
# The RustSec advisory database
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fail on yanked crates
yanked = "deny"
# Security advisories to ignore (with justification).
#
# Review schedule: monthly (or immediately on new CVE disclosures).
# Last reviewed: 2026-04-25 (v0.6.1 patch)
# To review: cargo deny check advisories 2>&1 | grep -E "RUSTSEC|warning"
ignore = [
    # RUSTSEC-2023-0089 (atomic-polyfill): unmaintained crate.
    # Root cause: transitive dep of embedded/no-std crates in our dep tree.
    # Exploitability: none — no exploitable code path in our server context.
    # Target remediation: remove when upstream crates drop atomic-polyfill.
    { id = "RUSTSEC-2023-0089", reason = "transitive dep of no-std crates; no exploitable path in server context" },
    # ------------------------------------------------------------------
    # v0.6.0: printpdf 0.9 PDF compliance report generation brings in
    # four unmaintained transitive deps. Printpdf itself is actively
    # maintained but has not yet migrated these sub-deps. All four are
    # in the PDF render path only — no untrusted input flows into them
    # (PDF content is generated from internal audit state, not parsed).
    # Target remediation: wait for printpdf to upgrade; revisit if a
    # vuln (not unmaintained-status) lands against any of them.
    # ------------------------------------------------------------------
    # RUSTSEC-2023-0019 (kuchiki): HTML/DOM library used by printpdf for
    # CSS-style layout. We never feed it untrusted HTML.
    { id = "RUSTSEC-2023-0019", reason = "transitive via printpdf render path; no untrusted HTML parsed" },
    # RUSTSEC-2024-0370 (proc-macro-error): build-time only (proc-macro
    # dep via ouroboros_macro → allsorts → azul-layout → printpdf).
    # Cannot be exploited at runtime.
    { id = "RUSTSEC-2024-0370", reason = "build-time proc-macro dep via printpdf; no runtime surface" },
    # RUSTSEC-2025-0057 (fxhash): simple non-cryptographic hash used by
    # CSS selectors (transitive via printpdf). Not a security-sensitive
    # use.
    { id = "RUSTSEC-2025-0057", reason = "transitive via printpdf CSS selectors; non-security hash use" },
    # RUSTSEC-2025-0141 (bincode 1.x): used by the hyphenation crate to
    # load its bundled dictionaries (transitive via printpdf). Inputs
    # are known-good dictionaries packaged with the crate, not
    # user-provided bytes.
    { id = "RUSTSEC-2025-0141", reason = "transitive via printpdf hyphenation dicts; inputs are bundled, not user-supplied" },
    # RUSTSEC-2026-0097 (rand unsoundness): triggered ONLY when a
    # custom global `log` logger implementation calls `rand::rng()`
    # during its emit path, causing aliased mutable references on
    # reseed. Kimberlite uses `tracing` for logs, not `log`, and no
    # subscriber in our tree calls into `rand`. Tracking upstream
    # upgrades to rand 0.8.6 / 0.9.3 / 0.10.1 in v0.7.0; safe to
    # ignore for v0.6.1.
    { id = "RUSTSEC-2026-0097", reason = "rand unsoundness only with custom log logger calling rand::rng(); we use tracing and no subscriber calls rand" },
]

# --------------------------------------------------
# LICENSES
# --------------------------------------------------

[licenses]
version = 2
# Confidence threshold for license detection
confidence-threshold = 0.93
# Allowed licenses (permissive licenses suitable for compliance-focused software)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",            # Boost Software License (e.g. error-code crate)
    "CC0-1.0",
    "CDLA-Permissive-2.0", # Community Data License Agreement Permissive 2.0
    "ISC",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",               # zlib License (permissive, used by some crypto deps)
]

# Clarify licenses for crates with non-standard license files
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# Exceptions for crates with complex license expressions
[[licenses.exceptions]]
name = "aws-lc-sys"
allow = ["ISC", "Apache-2.0", "OpenSSL"]

# --------------------------------------------------
# BANS
# --------------------------------------------------

[bans]
# Deny wildcard dependencies — except for path-only dev-dependencies on
# internal `publish = false` crates. The kimberlite-query → kimberlite-sim
# dev-dep is intentionally a wildcard so `cargo publish` can strip the
# internal-only relationship from the published manifest (see
# crates/kimberlite-query/Cargo.toml:49 — also referenced by the
# `3638b41 fix(release): strip internal-only dev-dep for crates.io
# publish` post-v0.4.2 hotfix).
wildcards = "deny"
allow-wildcard-paths = true
# Allow multiple versions of the same crate (for now)
multiple-versions = "warn"
# Highlighting for dependency graphs
highlight = "all"
# Deny specific crates known to be problematic
deny = [
    # rand_core is allowed as a transitive dep of rand and crypto crates that
    # implement RngCore-compatible interfaces (ed25519-dalek, rand_chacha,
    # crypto-common, rand_xorshift). rand_pcg is the build-time PRNG used
    # by phf_generator via the printpdf → kuchiki → html5ever chain — not
    # runtime code. Direct application use should go through rand instead.
    { name = "rand_core", wrappers = ["rand", "ed25519-dalek", "rand_chacha", "rand_hc", "rand_pcg", "crypto-common", "rand_xorshift"] },
]
# Skip checking duplicate versions for these crates
skip = []
# Skip tree analysis for these crates
skip-tree = []

# --------------------------------------------------
# SOURCES
# --------------------------------------------------

[sources]
# Deny unknown registries
unknown-registry = "deny"
# Deny git dependencies (require explicit allow)
unknown-git = "deny"
# Only allow crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Allow specific git sources if needed
# allow-git = []

# --------------------------------------------------
# OUTPUT
# --------------------------------------------------

[output]
# Show feature resolution in output
feature-depth = 1
