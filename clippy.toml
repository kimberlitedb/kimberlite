# Workspace clippy configuration.
#
# Tunes lints enabled per-crate via #![warn(...)] attributes.
# Global lint levels themselves live in the workspace Cargo.toml
# under [workspace.lints.clippy].

# PRESSURECRAFT: function-size threshold. Applies wherever
# `#![warn(clippy::too_many_lines)]` is enabled at the crate root.
#
# The CLAUDE.md 70-line rule is aspirational for new code. We set the
# lint threshold higher (120) because VSR protocol handlers and the
# kernel's effect-producing command handlers are inherently long —
# their length reflects the number of protocol cases they cover, not
# accidental complexity. Functions exceeding this threshold must either
# be decomposed or carry an explicit #[allow(clippy::too_many_lines)]
# with a rationale in a nearby comment.
too-many-lines-threshold = 120

# When `clippy::unwrap_used` is enabled per-crate, these types are
# allowed to call `.unwrap()` because their `unwrap` is not a failure
# path (infallible constructors, const-arithmetic helpers). Keep this
# list minimal.
# allow-unwrap-in-tests = true  # also handled via #[cfg_attr(test, allow(...))]
