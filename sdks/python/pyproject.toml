[build-system]
# setuptools >=77.0 is the first release that accepts the PEP 639
# bare-string `license = "Apache-2.0"` in [project] without flagging it
# as ambiguous against the legacy `{text = "..."}` form. Older setuptools
# (bundled with CPython 3.8/3.9's default `pip install`) rejects the
# build with:
#   configuration error: `project.license` must be valid exactly by one
#   definition (2 matches found)
# — which was blocking the v0.6.1 Python 3.8/3.9 CI matrix.
requires = ["setuptools>=77.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kimberlite"
version = "0.7.0"
description = "Python SDK for Kimberlite database"
readme = "README.md"
# v0.7.0 — floor bumped 3.9 → 3.10. Python 3.9 reached EOL
# 2025-10. The bump unlocks PEP 604 union syntax (`X | None`) at
# runtime (not just under `from __future__ import annotations`),
# which the typing-refresh roadmap item leans on. Downstream
# consumers pinned to 3.9 should hold at kimberlite==0.6.2 until
# they upgrade their interpreter.
requires-python = ">=3.10"
# PEP 639: SPDX expression, not the legacy `license = {text = ...}`
# form. Combined with the deletion of the legacy
# `License :: OSI Approved :: Apache Software License` classifier
# below — having both in a Metadata-Version 2.4 wheel triggers a PyPI
# 400 ("License classifier conflict with license field").
license = "Apache-2.0"
# Repo LICENSE lives at `../../LICENSE`, outside setuptools' project
# root — add via build_wheel.sh copy step if we ever need it bundled.
# The SPDX expression above identifies the license unambiguously.
authors = [
    {name = "Kimberlite Team", email = "team@kimberlite.dev"},
]
keywords = ["database", "compliance", "audit", "healthcare", "event-sourcing"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0",
    "build>=0.10.0",
    "wheel>=0.40.0",
    "twine>=4.0.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/kimberlitedb/kimberlite"
Documentation = "https://kimberlite.dev/docs"
Repository = "https://github.com/kimberlitedb/kimberlite"
Issues = "https://github.com/kimberlitedb/kimberlite/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["kimberlite*"]

[tool.setuptools.package-data]
kimberlite = ["lib/*.so", "lib/*.dylib", "lib/*.dll", "py.typed"]

[tool.mypy]
# v0.7.0 — bumped from 3.9 to 3.10 in lockstep with `requires-python`.
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --strict-markers"

[tool.black]
line-length = 100
# v0.7.0 — drop 3.9 from the target list to match `requires-python`.
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py310"
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = []

[tool.coverage.run]
source = ["kimberlite"]
omit = ["*/tests/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
