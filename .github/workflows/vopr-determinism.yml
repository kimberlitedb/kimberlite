name: VOPR Determinism Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  determinism-check:
    name: Determinism Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build VOPR
        run: cargo build --release -p kimberlite-sim --bin vopr

      - name: Run determinism check - Baseline scenario
        run: |
          ./target/release/vopr \
            --scenario baseline \
            --iterations 100 \
            --check-determinism \
            --seed 12345

      - name: Run determinism check - Combined scenario
        run: |
          ./target/release/vopr \
            --scenario combined \
            --iterations 50 \
            --check-determinism \
            --seed 54321

      - name: Run determinism check - Multi-tenant
        run: |
          ./target/release/vopr \
            --scenario multi-tenant \
            --iterations 50 \
            --check-determinism \
            --seed 99999

      - name: Run determinism check with higher iteration count
        run: |
          ./target/release/vopr \
            --iterations 200 \
            --check-determinism \
            --seed 88888

      - name: Save VOPR results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vopr-failure-logs
          path: vopr-results/
          retention-days: 7
