name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.4.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          echo "::add-mask::$CARGO_REGISTRY_TOKEN"
          publish_or_skip() {
            local pkg="$1"
            if cargo publish -p "$pkg" 2>&1 | tee /tmp/publish.log; then
              echo "✓ Published $pkg"
            elif grep -q "already uploaded" /tmp/publish.log; then
              echo "⏭ $pkg already published at this version, skipping"
            else
              cat /tmp/publish.log
              exit 1
            fi
          }
          publish_or_skip kimberlite-types
          sleep 30
          publish_or_skip kimberlite-crypto
          sleep 30
          publish_or_skip kimberlite-storage
          sleep 30
          publish_or_skip kimberlite-kernel
          sleep 30
          publish_or_skip kimberlite
          sleep 30
          publish_or_skip kimberlite-client
