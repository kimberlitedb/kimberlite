name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing via GitHub OIDC

jobs:
  # ----------------------------------------
  # Build binaries for all platforms
  # ----------------------------------------

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kimberlite-linux-x86_64
            cross: false
            zigbuild: false

          # Linux ARM64 (native ARM64 runner - avoids GCC 5 ICE in cross Docker image)
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: kimberlite-linux-aarch64
            cross: false
            zigbuild: false

          # macOS x86_64 (native Apple clang cross-compiles ARM→x86_64 without zigbuild)
          - os: macos-15
            target: x86_64-apple-darwin
            artifact_name: kimberlite-macos-x86_64
            cross: false
            zigbuild: false

          # macOS ARM64
          - os: macos-15
            target: aarch64-apple-darwin
            artifact_name: kimberlite-macos-aarch64
            cross: false
            zigbuild: false

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kimberlite-windows-x86_64
            cross: false
            zigbuild: false

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM Linux)
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Install cargo-zigbuild (for macOS cross-compile)
        if: matrix.zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Install Zig (for zigbuild)
        if: matrix.zigbuild
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.13.0

      - name: Add Rust target (macOS ARM→x86_64 cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build (native)
        if: "!matrix.cross && !matrix.zigbuild && matrix.target != 'x86_64-apple-darwin'"
        run: cargo build --release --target ${{ matrix.target }} -p kimberlite-cli

      - name: Build (native - macOS ARM→x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        env:
          # Override -Ctarget-cpu=native: on an ARM runner "native" resolves to arm64,
          # not x86_64. Apple clang handles the cross-compilation transparently.
          RUSTFLAGS: ""
        run: cargo build --release --target x86_64-apple-darwin -p kimberlite-cli

      - name: Build (zigbuild)
        if: matrix.zigbuild
        env:
          # Override -Ctarget-cpu=native from .cargo/config.toml: cross-compiling
          # from an ARM runner to x86_64 makes "native" resolve to the wrong arch.
          RUSTFLAGS: ""
        run: cargo zigbuild --release --target ${{ matrix.target }} -p kimberlite-cli

      - name: Build (cross)
        if: matrix.cross
        env:
          # Override -Ctarget-cpu=native from .cargo/config.toml: cross-compiling
          # from an x86_64 runner to aarch64 makes "native" resolve to the wrong arch.
          RUSTFLAGS: ""
        run: cross build --release --target ${{ matrix.target }} -p kimberlite-cli

      - name: Smoke test binary (native)
        if: "!matrix.cross && !matrix.zigbuild && matrix.target != 'x86_64-apple-darwin'"
        run: |
          ./target/${{ matrix.target }}/release/kimberlite version
          echo "✓ Binary executed successfully"

      - name: Smoke test binary (macOS x86_64 - verify file only)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          # Can't execute x86_64 binary on ARM runner, just verify it exists and is the right arch
          if [ -f target/${{ matrix.target }}/release/kimberlite ]; then
            echo "✓ Binary built successfully"
            file target/${{ matrix.target }}/release/kimberlite
          else
            echo "✗ Binary not found"
            exit 1
          fi

      - name: Smoke test binary (cross - Linux ARM on x86)
        if: matrix.cross
        run: |
          # Cross-compiled ARM binary can't run on x86, verify it exists and is correct architecture
          if [ -f target/${{ matrix.target }}/release/kimberlite ]; then
            echo "✓ Binary built successfully"
            file target/${{ matrix.target }}/release/kimberlite
          else
            echo "✗ Binary not found"
            exit 1
          fi

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/kimberlite dist/
          cp README.md dist/
          cp LICENSE dist/ 2>/dev/null || echo "No LICENSE file"
          cd dist && zip -r ../${{ matrix.artifact_name }}.zip .

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/kimberlite.exe dist/
          Copy-Item README.md dist/
          if (Test-Path LICENSE) { Copy-Item LICENSE dist/ }
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 7

  # ----------------------------------------
  # Create GitHub Release
  # ----------------------------------------

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name "*.zip" -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.zip > SHA256SUMS
          sha512sum *.zip > SHA512SUMS
          # Keep checksums.txt for backwards compat
          cp SHA256SUMS checksums.txt
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign checksums with cosign (keyless)
        continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: "false"
        run: |
          cd release
          cosign sign-blob --yes SHA256SUMS --bundle SHA256SUMS.bundle
          cosign sign-blob --yes SHA512SUMS --bundle SHA512SUMS.bundle

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Kimberlite ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release/*.zip
            release/SHA256SUMS
            release/SHA512SUMS
            release/checksums.txt
          body: |
            ## Installation

            **Recommended:** Install with one command:
            ```bash
            curl -fsSL https://kimberlite.dev/install.sh | sh
            ```

            Or use your preferred package manager:
            ```bash
            brew install kimberlitedb/tap/kimberlite    # Homebrew
            docker pull ghcr.io/kimberlitedb/kimberlite  # Docker
            cargo install kimberlite-cli                  # Cargo
            ```

            ### Direct Downloads

            | Platform | Download |
            |----------|----------|
            | Linux x86_64 | [kimberlite-linux-x86_64.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/kimberlite-linux-x86_64.zip) |
            | Linux ARM64 | [kimberlite-linux-aarch64.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/kimberlite-linux-aarch64.zip) |
            | macOS x86_64 | [kimberlite-macos-x86_64.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/kimberlite-macos-x86_64.zip) |
            | macOS ARM64 | [kimberlite-macos-aarch64.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/kimberlite-macos-aarch64.zip) |
            | Windows x86_64 | [kimberlite-windows-x86_64.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/kimberlite-windows-x86_64.zip) |

            ## Quick Start

            ```bash
            kimberlite init --template healthcare my-project
            cd my-project
            kimberlite dev
            ```

            See the [documentation](https://kimberlite.dev/docs) for more details.

  # ----------------------------------------
  # Build and push Docker image
  # ----------------------------------------

  docker:
    name: Docker Image
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            TAG="${{ inputs.tag }}" && echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.tag.outputs.tag }}
          tags: |
            ghcr.io/kimberlitedb/kimberlite:${{ steps.tag.outputs.version }}
            ghcr.io/kimberlitedb/kimberlite:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------
  # Publish to crates.io
  # ----------------------------------------

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # IMPORTANT: pipefail is required. Without it, `cargo publish | tee`
          # returns tee's exit code (always 0), silently hiding cargo failures
          # and falsely reporting "✓ Published" for unpublished crates.
          # Fix landed alongside v0.4.2 (see AUDIT_RELEASE_READINESS_APRIL_2026).
          echo "::add-mask::$CARGO_REGISTRY_TOKEN"
          publish_or_skip() {
            local pkg="$1"
            set +e
            cargo publish -p "$pkg" 2>&1 | tee /tmp/publish.log
            local rc=${PIPESTATUS[0]}
            set -e
            if [ "$rc" -eq 0 ]; then
              echo "✓ Published $pkg"
            elif grep -qE "already (uploaded|exists on crates\.io)" /tmp/publish.log; then
              echo "⏭ $pkg already published at this version, skipping"
            else
              echo "::error::cargo publish failed for $pkg (rc=$rc)"
              cat /tmp/publish.log
              exit 1
            fi
          }
          # Dependency-respecting topological order for all 25 publishable
          # crates. Source of truth: `cargo metadata --no-deps`.
          # 30s delays let the crates.io index settle between tiers.
          # Tier 0 — leaves (no internal deps)
          publish_or_skip kimberlite-agent-protocol
          publish_or_skip kimberlite-config
          publish_or_skip kimberlite-event-sourcing
          publish_or_skip kimberlite-io
          publish_or_skip kimberlite-properties
          publish_or_skip kimberlite-types
          sleep 30
          # Tier 1 — depend on tier-0 leaves
          publish_or_skip kimberlite-crypto
          sleep 30
          publish_or_skip kimberlite-abac
          publish_or_skip kimberlite-directory
          publish_or_skip kimberlite-kernel
          publish_or_skip kimberlite-migration
          publish_or_skip kimberlite-rbac
          sleep 30
          # Tier 2
          publish_or_skip kimberlite-compliance
          publish_or_skip kimberlite-sharing
          publish_or_skip kimberlite-storage
          publish_or_skip kimberlite-store
          publish_or_skip kimberlite-wire
          sleep 30
          # Tier 3
          publish_or_skip kimberlite-vsr
          publish_or_skip kimberlite-query
          sleep 30
          # Tier 4 — facade + clients
          publish_or_skip kimberlite-client
          publish_or_skip kimberlite
          sleep 30
          # Tier 5 — downstream/optional
          publish_or_skip kimberlite-mcp
          publish_or_skip kimberlite-oracle
          publish_or_skip kimberlite-server
          sleep 30
          # Tier 6 — test harness (depends on kimberlite + kimberlite-server + kimberlite-client)
          publish_or_skip kimberlite-test-harness

  # ----------------------------------------
  # Trigger Homebrew tap update
  # ----------------------------------------

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Homebrew tap update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: kimberlitedb/homebrew-tap
          event-type: update-formula
          client-payload: '{"tag": "${{ steps.tag.outputs.tag }}"}'
