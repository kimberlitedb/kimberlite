name: Formal Verification

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'specs/**'
      - 'crates/**/*.rs'
      - '.github/workflows/formal-verification.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'specs/**'
      - 'crates/**/*.rs'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Enable parallel TLC workers
  TLC_WORKERS: 4

# This workflow gates PRs. Every job must pass. Aspirational proofs (TLAPS,
# Ivy) live in formal-verification-aspirational.yml and run nightly
# off-hours only; they are not required to merge.

jobs:
  # Layer 1: Protocol Specifications
  tla-tlc:
    name: TLA+ Model Checking (Bounded)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install TLA+ Tools
        run: |
          # Download TLA+ tools
          TLA_VERSION="1.8.0"
          # SHA256 for tla2tools.jar v1.8.0 (verified against upstream).
          # Update this hash when upgrading TLA_VERSION.
          TLA_SHA256="4c1d62e0f67c1d89f833619d7edad9d161e74a54b153f4f81dcef6043ea0d618"
          wget "https://github.com/tlaplus/tlaplus/releases/download/v${TLA_VERSION}/tla2tools.jar"
          echo "${TLA_SHA256}  tla2tools.jar" | sha256sum --check || (echo "ERROR: tla2tools.jar checksum mismatch -- possible supply-chain attack" && exit 1)
          echo "TLA_JAR=$PWD/tla2tools.jar" >> $GITHUB_ENV

      - name: Verify VSR.tla
        run: |
          # Use VSR_Small.cfg (MaxView=2, MaxOp=2, MaxCommit=2) for CI speed.
          # VSR.cfg (MaxView=3, MaxOp=4, MaxCommit=4) generates a state space too
          # large to explore within the 60-minute CI timeout. Full-config runs
          # happen nightly on EPYC via `just fv-epyc-tla-full`.
          java -cp $TLA_JAR tlc2.TLC -deadlock -workers $TLC_WORKERS -depth 10 -config specs/tla/VSR_Small.cfg specs/tla/VSR.tla
        continue-on-error: false

      - name: Verify ViewChange.tla
        run: |
          java -cp $TLA_JAR tlc2.TLC -deadlock -workers $TLC_WORKERS -depth 10 -config specs/tla/ViewChange_Small.cfg specs/tla/ViewChange.tla
        continue-on-error: false

      - name: Verify Recovery.tla
        run: |
          java -cp $TLA_JAR tlc2.TLC -deadlock -workers $TLC_WORKERS -depth 10 -config specs/tla/Recovery.cfg specs/tla/Recovery.tla
        continue-on-error: false

      - name: Verify Compliance.tla
        run: |
          java -cp $TLA_JAR tlc2.TLC -deadlock -workers $TLC_WORKERS -depth 8 -config specs/tla/Compliance.cfg specs/tla/Compliance.tla
        continue-on-error: false

      - name: Upload TLC logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tlc-logs
          path: |
            *.out
            *.log

  alloy-verify:
    name: Alloy Structural Models
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Alloy
        run: |
          ALLOY_VERSION="6.2.0"
          ALLOY_JAR_NAME="alloy-${ALLOY_VERSION}.jar"
          # SHA256 for org.alloytools.alloy.dist.jar v6.2.0 (verified against upstream).
          # Update this hash when upgrading ALLOY_VERSION.
          ALLOY_SHA256="6b8c1cb5bc93bedfc7c61435c4e1ab6e688a242dc702a394628d9a9801edb78d"
          wget "https://github.com/AlloyTools/org.alloytools.alloy/releases/download/v${ALLOY_VERSION}/org.alloytools.alloy.dist.jar" -O "${ALLOY_JAR_NAME}"
          echo "${ALLOY_SHA256}  ${ALLOY_JAR_NAME}" | sha256sum --check || (echo "ERROR: Alloy JAR checksum mismatch -- possible supply-chain attack" && exit 1)
          echo "ALLOY_JAR=$PWD/${ALLOY_JAR_NAME}" >> $GITHUB_ENV

      - name: Verify Simple.als (test)
        run: |
          java -Djava.awt.headless=true -jar $ALLOY_JAR exec specs/alloy/Simple.als
        continue-on-error: false

      - name: Verify HashChain.als (quick, scope 5)
        run: |
          # Use HashChain-quick.als (scope 5) for CI speed; HashChain.als (scope 10)
          # is the full spec, run nightly on EPYC via `just fv-epyc-alloy-full`.
          java -Djava.awt.headless=true -jar $ALLOY_JAR exec specs/alloy/HashChain-quick.als
        continue-on-error: false

      - name: Verify Quorum.als
        run: |
          java -Djava.awt.headless=true -jar $ALLOY_JAR exec specs/alloy/Quorum.als
        continue-on-error: false

  # Layer 1b: Byzantine Consensus Model (Ivy)
  # Ivy is PR-blocking as of the FV CI promotion (2026-04). The upstream
  # v0.1-msv tag has Python 2/3 issues that require a pinned workaround;
  # the install step is tolerant of transient pip failures, but
  # ivy_check on VSR_Byzantine.ivy is hard-failing — 5 safety invariants
  # must pass for the PR to merge.
  ivy-verify:
    name: Ivy Byzantine Model
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install Ivy (pinned v0.1-msv)
        run: |
          # Pin to v0.1-msv tag for reproducibility — avoids fragile HEAD clones.
          # DO NOT run git submodule update: Z3 built from C++ source segfaults on ARM
          # (AWS Graviton / Apple Silicon). The z3-solver pip package provides pre-built
          # ARM-compatible binaries.
          sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev

          git clone --depth 1 --branch v0.1-msv https://github.com/kenmcmil/ivy.git /tmp/ivy

          pip install pyparsing ply tarjan pydot ordered-set z3-solver

          cd /tmp/ivy
          SKIP_Z3_BUILD=1 pip install -e . --no-build-isolation || pip install -e .

          # ivy_check uses bare 'import concept'; PYTHONPATH must point to /tmp/ivy/ivy
          export PYTHONPATH=/tmp/ivy/ivy:${PYTHONPATH}
          echo "PYTHONPATH=/tmp/ivy/ivy:${PYTHONPATH}" >> $GITHUB_ENV

          ivy_check --help

      - name: Verify Byzantine consensus model
        run: |
          ivy_check specs/ivy/VSR_Byzantine.ivy
        continue-on-error: false

  # Layer 2: Cryptographic Verification (Coq)
  coq-verify:
    name: Coq Cryptographic Proofs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Coq files
        run: |
          # Pinned Coq 8.18 via Docker. The full list intentionally mirrors
          # the `verify-coq` justfile recipe so local and CI stay in sync.
          FILES=(Common.v SHA256.v BLAKE3.v AES_GCM.v Ed25519.v KeyHierarchy.v)
          # MessageSerialization.v and Extract.v are optional (skipped if absent)
          OPTIONAL=(MessageSerialization.v Extract.v)

          docker pull coqorg/coq:8.18

          # coqorg/coq's default user (coq:1000) cannot write .glob/.vo
          # artifacts to a root-owned bind mount. Mount specs dir read-
          # only and copy into /tmp inside the container.
          failed=0
          for f in "${FILES[@]}"; do
            echo "::group::Verifying specs/coq/${f}"
            if docker run --rm -v "$PWD/specs/coq:/src:ro" coqorg/coq:8.18 \
                bash -c "mkdir -p /tmp/coq && cp /src/*.v /tmp/coq/ && cd /tmp/coq && coqc -Q . Kimberlite '${f}'"; then
              echo "OK: ${f}"
            else
              echo "::error::Coq verification failed: ${f}"
              failed=$((failed + 1))
            fi
            echo "::endgroup::"
          done
          for f in "${OPTIONAL[@]}"; do
            [ -f "specs/coq/${f}" ] || continue
            echo "::group::Verifying specs/coq/${f} (optional)"
            if docker run --rm -v "$PWD/specs/coq:/src:ro" coqorg/coq:8.18 \
                bash -c "mkdir -p /tmp/coq && cp /src/*.v /tmp/coq/ && cd /tmp/coq && coqc -Q . Kimberlite '${f}'"; then
              echo "OK: ${f}"
            else
              echo "::warning::Optional Coq file failed: ${f}"
            fi
            echo "::endgroup::"
          done
          exit $failed

  # Layer 3: Code Verification (Kani bounded model checking)
  kani-verify:
    name: Kani Bounded Model Checking
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-kani-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-kani-

      - name: Install Kani
        run: |
          if ! command -v cargo-kani >/dev/null 2>&1; then
            cargo install --locked kani-verifier
          fi
          cargo kani setup

      - name: Run Kani harnesses (bounded unwind 32)
        run: |
          # CI uses unwind 32 for 60-minute budget. Full unwind-128 runs
          # nightly on EPYC via `just fv-epyc-kani-full`.
          cargo kani --workspace --default-unwind 32 --no-unwinding-checks

  # Layer 4: Undefined-Behaviour Detection (MIRI)
  miri-check:
    name: MIRI Undefined-Behaviour Detection
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install nightly Rust with miri
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # master
        with:
          toolchain: nightly
          components: miri,rust-src

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-miri-

      - name: Setup miri
        run: cargo +nightly miri setup

      - name: Run MIRI on storage/crypto/types
        env:
          # Skip tests that use FFI (miri cannot execute foreign code).
          MIRIFLAGS: "-Zmiri-disable-isolation"
        run: |
          cargo +nightly miri test \
            -p kimberlite-storage \
            -p kimberlite-crypto \
            -p kimberlite-types \
            --lib --no-default-features

  # Summary job (reports overall status)
  verification-summary:
    name: Verification Summary
    needs: [tla-tlc, alloy-verify, ivy-verify, coq-verify, kani-verify, miri-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Formal Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## PR-blocking layers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          check() {
            local name="$1"; local label="$2"; local result="$3"
            if [ "$result" = "success" ]; then
              echo "✅ **${label}**: Passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **${label}**: ${result}" >> $GITHUB_STEP_SUMMARY
            fi
          }
          check "tla-tlc" "TLA+ Model Checking (TLC)" "${{ needs.tla-tlc.result }}"
          check "alloy-verify" "Alloy Structural Models" "${{ needs.alloy-verify.result }}"
          check "ivy-verify" "Ivy Byzantine Consensus Model" "${{ needs.ivy-verify.result }}"
          check "coq-verify" "Coq Cryptographic Proofs" "${{ needs.coq-verify.result }}"
          check "kani-verify" "Kani Bounded Model Checking" "${{ needs.kani-verify.result }}"
          check "miri-check" "MIRI Undefined-Behaviour Detection" "${{ needs.miri-check.result }}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Aspirational layers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "TLAPS mechanized proofs and Ivy Byzantine model run nightly in" >> $GITHUB_STEP_SUMMARY
          echo "\`formal-verification-aspirational.yml\` and do not block merges." >> $GITHUB_STEP_SUMMARY
          echo "Full-capacity runs of every layer happen on the Hetzner EPYC box" >> $GITHUB_STEP_SUMMARY
          echo "via \`just fv-epyc-all\` (see docs-internal/design-docs/active/" >> $GITHUB_STEP_SUMMARY
          echo "fv-epyc-deployment.md)." >> $GITHUB_STEP_SUMMARY

      - name: Check critical failures
        run: |
          for r in \
            "${{ needs.tla-tlc.result }}" \
            "${{ needs.alloy-verify.result }}" \
            "${{ needs.ivy-verify.result }}" \
            "${{ needs.coq-verify.result }}" \
            "${{ needs.kani-verify.result }}" \
            "${{ needs.miri-check.result }}"
          do
            if [ "$r" != "success" ]; then
              echo "::error::A critical FV job failed (status: $r)"
              exit 1
            fi
          done
          echo "✅ All 6 PR-blocking FV layers passed"
