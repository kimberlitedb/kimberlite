name: Benchmarks

run-name: "Bench '${{ github.head_ref || github.ref_name }}'"

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: read
  pull-requests: write

jobs:
  bench:
    name: Performance regression check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      # On main: save baseline for future PR comparisons
      - name: Run benchmarks (save baseline)
        if: github.ref == 'refs/heads/main'
        run: cargo bench -p kimberlite-bench

      - name: Upload baseline artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: criterion-baseline
          path: target/criterion
          retention-days: 30

      # On PRs: compare against main baseline
      - name: Download baseline artifact
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@8305c0f1062bb0d184d09ef4493ecb9288447732 # v20
        with:
          name: criterion-baseline
          path: target/criterion
          workflow: bench.yml
          branch: main
          if_no_artifact_found: warn

      - name: Run benchmarks (compare against main)
        if: github.event_name == 'pull_request'
        run: |
          cargo bench -p kimberlite-bench 2>&1 | tee bench-output.txt
          # Check for regressions
          if grep -q "regressed" bench-output.txt; then
            echo "::warning::Performance regressions detected. Review benchmark output."
          fi
