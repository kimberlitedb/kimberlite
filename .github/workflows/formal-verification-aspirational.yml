name: Formal Verification (Aspirational)

# Nightly, best-effort verification for the TLAPS mechanized proof layer.
#
# After the 2026-04-17 TLAPS 27-theorem campaign, 16 Category-A theorems
# are mechanically discharged across four proof files. Remaining theorems
# are Category B (cross-tool credit; proved elsewhere in PR CI) or
# Category C (liveness, VOPR-covered; out of TLAPS scope). See
# `specs/README.md` § "Coverage Rubric (A/B/C)" and
# `docs/internals/formal-verification/traceability-matrix.md`.
#
# Ivy Byzantine model was promoted to PR-blocking CI in 2026-04 and now
# lives in formal-verification.yml; this workflow carries only the TLAPS
# jobs.
#
# This workflow runs the whole-file verification: every file that parses
# clean and emits "All N obligations proved" passes. PROOF OMITTED
# theorems contribute no obligations (tlapm treats them as axioms for
# citation), so a file-level pass covers every Category-A theorem in
# that file plus every cross-citation.
#
# Full-capacity runs at --stretch 10000 happen on the Hetzner EPYC box
# via `just fv-epyc-tlaps-full`.

on:
  schedule:
    # 03:00 UTC daily — 1 hour after the VOPR nightly (02:00) so we don't
    # thrash compute on the same hour.
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  tla-tlaps:
    name: TLAPS Mechanized Proofs (Unbounded)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Each step's `continue-on-error: false` makes individual theorem
    # groups hard-fail; the job-level continue-on-error below is FALSE
    # now that the campaign is landed — any regression in a mechanized
    # theorem should page us. Soak for 7 nights before promoting to PR.
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build TLAPS Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: tools/formal-verification/docker/tlaps
          load: true
          tags: kimberlite-tlaps:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Verification strategy: run each proof file end-to-end. tlapm
      # emits "[INFO]: All N obligations proved." iff every non-OMITTED
      # theorem in the file closes. Category-B and Category-C theorems
      # (PROOF OMITTED) generate no obligations — they are treated as
      # axioms for citation by downstream theorems — so file-level
      # success implies every mechanized Category-A theorem in that
      # file is green.
      #
      # tlapm 1.6.0-pre does not exit non-zero on proof failure;
      # explicit grep of the success line enforces hard-fail.

      - name: Verify Compliance_Proofs.tla (10 theorems, all Category A)
        run: |
          docker run --rm -v $PWD/specs/tla:/spec kimberlite-tlaps:latest \
            --stretch 3000 --cleanfp /spec/Compliance_Proofs.tla \
            2>&1 | tee tlaps-compliance.log
          grep -qE 'All [0-9]+ obligations? proved' tlaps-compliance.log
        continue-on-error: false

      - name: Verify Recovery_Proofs.tla (3 Category A + 1 Category C)
        run: |
          docker run --rm -v $PWD/specs/tla:/spec kimberlite-tlaps:latest \
            --stretch 3000 --cleanfp /spec/Recovery_Proofs.tla \
            2>&1 | tee tlaps-recovery.log
          grep -qE 'All [0-9]+ obligations? proved' tlaps-recovery.log
        continue-on-error: false

      - name: Verify ViewChange_Proofs.tla (1 Category A + 2 Category B)
        run: |
          docker run --rm -v $PWD/specs/tla:/spec kimberlite-tlaps:latest \
            --stretch 3000 --cleanfp /spec/ViewChange_Proofs.tla \
            2>&1 | tee tlaps-viewchange.log
          grep -qE 'All [0-9]+ obligations? proved' tlaps-viewchange.log
        continue-on-error: false

      - name: Verify VSR_Proofs.tla (2 Category A + 7 Category B)
        run: |
          docker run --rm -v $PWD/specs/tla:/spec kimberlite-tlaps:latest \
            --stretch 3000 --cleanfp /spec/VSR_Proofs.tla \
            2>&1 | tee tlaps-vsr.log
          grep -qE 'All [0-9]+ obligations? proved' tlaps-vsr.log
        continue-on-error: false

  aspirational-summary:
    name: Aspirational FV Summary
    needs: [tla-tlaps]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Aspirational Formal Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Nightly TLAPS discharge of the 16 Category-A theorems" >> $GITHUB_STEP_SUMMARY
          echo "landed in the 2026-04-17 campaign. Category B theorems" >> $GITHUB_STEP_SUMMARY
          echo "are PR-blocked in another tool (Ivy/Alloy/TLC) and" >> $GITHUB_STEP_SUMMARY
          echo "Category C is VOPR-covered. See \`specs/README.md\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.tla-tlaps.result }}" == "success" ]; then
            echo "✅ **TLAPS Mechanized Proofs**: all Category-A theorems pass at stretch 3000" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **TLAPS Mechanized Proofs**: at least one file failed; see job log" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ivy Byzantine model is PR-blocking as of 2026-04;" >> $GITHUB_STEP_SUMMARY
          echo "see \`.github/workflows/formal-verification.yml\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For full-capacity stretch-10000 runs, see: \`just fv-epyc-tlaps-full\`" >> $GITHUB_STEP_SUMMARY
