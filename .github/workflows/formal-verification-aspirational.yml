name: Formal Verification (Aspirational)

# Nightly, best-effort verification for proofs that aren't polished enough
# to block PR merges yet:
#   - TLAPS mechanized proofs (infrastructure works; only
#     ViewMonotonicityTheorem discharges cleanly at stretch 3000 today;
#     other theorems remain PROOF OMITTED with named outstanding
#     obligations per the epistemic-honesty policy).
#
# Ivy Byzantine model was promoted to PR-blocking CI in the 2026-04
# FV campaign and now lives in formal-verification.yml; this workflow
# only carries the TLAPS jobs that remain nightly-only.
#
# The per-PR workflow (formal-verification.yml) must stay green to merge;
# this one runs on a schedule and on-demand and is informational.
#
# Full-capacity runs of these same layers happen on the Hetzner EPYC box
# via `just fv-epyc-tlaps-full` (see docs-internal/design-docs/active/
# fv-epyc-deployment.md).

on:
  schedule:
    # 03:00 UTC daily — 1 hour after the VOPR nightly (02:00) so we don't
    # thrash compute on the same hour.
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  tla-tlaps:
    name: TLAPS Mechanized Proofs (Unbounded)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build TLAPS Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: tools/formal-verification/docker/tlaps
          load: true
          tags: kimberlite-tlaps:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Only ViewMonotonicityTheorem currently discharges cleanly at
      # stretch 3000 with the tlapm 1.6.0-pre binary in our Docker
      # image. Other theorems in VSR_Proofs.tla remain PROOF OMITTED
      # with named outstanding obligations; running them here would
      # just produce obligation lists, not pass/fail signal.
      #
      # When additional theorems are discharged, add a per-theorem
      # step below using --toolbox <start> <end> to isolate the
      # theorem's line range (tlapm 1.6.0-pre does not support --only).
      - name: Verify ViewMonotonicityTheorem
        run: |
          docker run --rm -v $PWD/specs/tla:/spec kimberlite-tlaps:latest \
            --stretch 3000 --cleanfp --toolbox 591 620 /spec/VSR_Proofs.tla \
            2>&1 | tee tlaps-viewmono.log
          # tlapm emits "[INFO]: All N obligations proved." on success
          # and does not exit non-zero on proof failure; grep for the
          # success line explicitly so the step fails properly.
          grep -qE 'All [0-9]+ obligations proved' tlaps-viewmono.log
        continue-on-error: false

  aspirational-summary:
    name: Aspirational FV Summary
    needs: [tla-tlaps]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Aspirational Formal Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "These workflows do not block PR merges. They track proofs" >> $GITHUB_STEP_SUMMARY
          echo "that are infrastructure-complete but proof-incomplete." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.tla-tlaps.result }}" == "success" ]; then
            echo "✅ **TLAPS Mechanized Proofs**: ViewMonotonicityTheorem passes" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **TLAPS Mechanized Proofs**: at least one theorem fails" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ivy Byzantine model is PR-blocking as of 2026-04;" >> $GITHUB_STEP_SUMMARY
          echo "see \`.github/workflows/formal-verification.yml\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For full-capacity runs, see: \`just fv-epyc-tlaps-full\`" >> $GITHUB_STEP_SUMMARY
