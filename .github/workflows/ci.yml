name: CI

run-name: "CI run '${{ github.head_ref || github.ref_name }}'"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # ----------------------------------------
  # Code quality checks
  # ----------------------------------------

  format:
    name: Check format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install rustfmt
        # `dtolnay/rust-toolchain`'s `components:` input doesn't reliably
        # propagate when rust-toolchain.toml drives the channel install.
        # `rustup component add` is the unambiguous path.
        run: rustup component add rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install clippy
        run: rustup component add clippy

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ----------------------------------------
  # Build and test
  # ----------------------------------------

  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS excluded: libduckdb-sys pulls in ring (via reqwest build-dep),
        # and ring's CAPS_STATIC assertion fails on Apple Silicon; Intel macOS
        # runners (macos-12, macos-13) are deprecated by GitHub.
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Run cargo check
        run: cargo check --workspace --all-targets --all-features

      - name: Build CLI binary
        run: cargo build -p kimberlite-cli

      - name: Smoke test CLI binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./target/debug/kimberlite.exe version
          else
            ./target/debug/kimberlite version
          fi
          echo "✓ CLI binary executed successfully on ${{ runner.os }}"

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # cargo test --workspace was running ~60 min on cold-cache CI runners
    # (3288 tests across 73 binaries) and tripping a runner-side watchdog.
    # nextest parallelises better and produces nicer output; cap at 45 min
    # so a future genuine hang fails loudly instead of silently SIGTERMing.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # macOS excluded: same ring/duckdb build-dep issue as check matrix.
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free disk space (Ubuntu only)
        # GitHub Ubuntu runners ship with only ~14 GB free on /. Our
        # 73-binary workspace + sccache + Cargo registry easily exceeds
        # that during a cold-cache build + nextest run, causing rustc
        # to OOM or kernel to SIGTERM the runner. Drop ~15 GB of
        # preinstalled tooling we don't use.
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Bumped key suffix `v2` after dropping `-Ctarget-cpu=native`
          # from .cargo/config.toml — old cached artifacts were built
          # with native CPU flags and SIGILL'd rustc on cache restore.
          key: ${{ runner.os }}-cargo-test-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-v2-

      - name: Build test binaries
        # Split out the build so a SIGTERM during link is visible
        # (compile + link of 73 binaries on a 2-core runner is the
        # heavy part). `-Cdebuginfo=0` drops debug symbols so linker
        # memory peaks fit in the 7 GB runner; backtraces are still
        # available locally and on Windows where memory is fine.
        # `--jobs 2` matches the 2-vCPU runner — default num_cpus
        # would be 2 anyway, but pinning prevents inadvertent
        # oversubscription if cargo's cgroup detection misreads.
        env:
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo nextest run --workspace --no-run --jobs 2

      - name: Disk space after build
        if: runner.os == 'Linux'
        run: df -h /

      - name: Run tests
        # --test-threads=2 keeps memory pressure manageable on the
        # 7 GB runner.
        env:
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo nextest run --workspace --no-fail-fast --test-threads=2

  # ----------------------------------------
  # MSRV check
  # ----------------------------------------

  msrv:
    name: Check MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e814c742d4444ce2f3f6abddea7faf00161ed941 # 1.88 (MSRV)

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Run cargo check
        run: cargo check --workspace --all-targets

  # ----------------------------------------
  # Documentation
  # ----------------------------------------

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      - name: Check documentation
        run: cargo doc --workspace --no-deps --all-features

  # ----------------------------------------
  # Code coverage
  # ----------------------------------------

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    # Same OOM/disk-pressure remediation as the `test` job. Coverage
    # builds under `-Cinstrument-coverage` so object files are ~3x
    # the size of normal debug builds — even more disk pressure.
    timeout-minutes: 45
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # `v2` cache-key bump — same `-Ctarget-cpu=native` poison
          # as the test/vopr-features caches.
          key: ${{ runner.os }}-cargo-coverage-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-v2-

      - name: Generate coverage report
        env:
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info --jobs 2

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          # Upload is best-effort — Codecov retired tokenless uploads
          # for this repo, so a missing `CODECOV_TOKEN` secret must not
          # fail the gate. Coverage still publishes when the token is
          # set; CI stays green either way.
          fail_ci_if_error: false
        continue-on-error: true

  # ----------------------------------------
  # Unused dependencies
  # ----------------------------------------

  unused-deps:
    name: Check unused dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install cargo-machete
        uses: taiki-e/install-action@cargo-machete

      - name: Check for unused dependencies
        run: cargo machete

  # ----------------------------------------
  # VOPR feature matrix (dashboard + tui)
  # ----------------------------------------

  vopr-features:
    name: VOPR feature matrix (dashboard, tui)
    runs-on: ubuntu-latest
    # Cap explicitly so feature-flag combinatorics can't silently
    # exhaust the implicit runner budget. Bumped from 30 → 45 because
    # the four sequential cargo invocations (dashboard test + tui
    # test + dashboard+tui check + dashboard+tui --test-threads=1
    # run) genuinely take ~32 min on cold cache; the last one hit
    # the previous 30-min wall.
    timeout-minutes: 45
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free disk space
        # Same OOM/disk-pressure remediation as the `test` job above.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # `v2` cache-key bump — same reason as the `test` job: old
          # cached artifacts were built with `-Ctarget-cpu=native` and
          # SIGILL'd rustc on cache restore once that flag was removed.
          key: ${{ runner.os }}-cargo-vopr-features-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-vopr-features-v2-

      - name: Test dashboard feature
        env:
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test -p kimberlite-sim --features dashboard --jobs 2

      - name: Test tui feature
        env:
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test -p kimberlite-sim --features tui --jobs 2

      - name: Check dashboard + tui together
        env:
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo check -p kimberlite-sim --features dashboard,tui --jobs 2

      - name: Run VOPR with dashboard + tui features
        env:
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test -p kimberlite-sim --features dashboard,tui --jobs 2 -- --test-threads=1

  # ----------------------------------------
  # Fuzz smoke test
  # ----------------------------------------

  fuzz-smoke:
    name: Fuzz Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust nightly (required for cargo-fuzz)
        uses: dtolnay/rust-toolchain@0f1b44df7e9cbb178d781a242338dfa5e243ad7f # nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz SQL parser (30s)
        run: |
          cd crates/kimberlite-sql
          cargo +nightly fuzz run fuzz_sql_parser -- -max_total_time=30 -max_len=4096 2>/dev/null || true
        continue-on-error: true

      - name: Fuzz crypto (30s)
        run: |
          cd crates/kimberlite-crypto
          cargo +nightly fuzz run fuzz_crypto_encrypt -- -max_total_time=30 2>/dev/null || true
        continue-on-error: true

      - name: Fuzz wire deserialize (30s)
        run: |
          cd crates/kimberlite-kernel
          cargo +nightly fuzz run fuzz_wire_deserialize -- -max_total_time=30 2>/dev/null || true
        continue-on-error: true

      - name: Check for crashes
        run: |
          # Fail if any fuzz target produced a crash artifact
          if find . -path "*/fuzz/artifacts/*" -name "crash-*" | grep -q .; then
            echo "❌ Fuzz crash artifacts found:"
            find . -path "*/fuzz/artifacts/*" -name "crash-*"
            exit 1
          fi
          echo "✅ No fuzz crashes detected"

  # ----------------------------------------
  # Required checks gate
  # ----------------------------------------

  required:
    name: Required checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - format
      - clippy
      - check
      - test
      - msrv
      - docs
      - unused-deps
      - vopr-features
    steps:
      - name: Check for failures
        run: |
          results=(
            "${{ needs.format.result }}"
            "${{ needs.clippy.result }}"
            "${{ needs.check.result }}"
            "${{ needs.test.result }}"
            "${{ needs.msrv.result }}"
            "${{ needs.docs.result }}"
            "${{ needs.unused-deps.result }}"
            "${{ needs.vopr-features.result }}"
          )

          failed=false
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "A required job had result: $result"
              failed=true
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo "One or more required checks failed"
            exit 1
          else
            echo "All required CI checks passed"
          fi
